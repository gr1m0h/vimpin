name: tagpr
# Maintains a release PR on every push to main. Merging the PR cuts the
# next semver tag, and the same job hands off to GoReleaser to publish a
# GitHub Release with auto-generated notes (.goreleaser.yaml changelog)
# and the cross-platform binaries.
#
# Bump kind is controlled by labels on merged PRs:
#   tagpr:minor / tagpr:major (default: patch).
#
# Token note: this workflow uses GITHUB_TOKEN end-to-end. tagpr cuts the
# tag, then GoReleaser runs in the same job against that tag, so we
# never depend on tag-push events firing downstream workflows (which
# GITHUB_TOKEN cannot do).

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  tagpr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - id: tagpr
        uses: Songmu/tagpr@e84001bd5dac8defa0c75b3913937d284a3b3660 # v1.20.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - if: steps.tagpr.outputs.tag != ''
        name: checkout new tag
        env:
          TAG: ${{ steps.tagpr.outputs.tag }}
        run: |
          git fetch --tags --force
          git checkout "$TAG"
      - if: steps.tagpr.outputs.tag != ''
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache: true
      - if: steps.tagpr.outputs.tag != ''
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
