name: tagpr
# Maintains a release PR on every push to main. Merging the PR cuts the
# next semver tag and publishes a GitHub Release whose body is generated
# by tagpr from the merged PR titles/descriptions.
#
# Bump kind is controlled by labels on merged PRs:
#   tagpr:minor / tagpr:major (default: patch).
#
# Token note: this workflow uses GITHUB_TOKEN. Tag pushes made with
# GITHUB_TOKEN do not start new workflow runs, so release.yml is fired
# explicitly via `gh workflow run` (workflow_dispatch is one of the few
# events GITHUB_TOKEN is allowed to trigger).

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  tagpr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: tagpr
        uses: Songmu/tagpr@e84001bd5dac8defa0c75b3913937d284a3b3660 # v1.20.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: dispatch release workflow on new tag
        if: steps.tagpr.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tagpr.outputs.tag }}
        run: gh workflow run release.yml --ref "$TAG"
