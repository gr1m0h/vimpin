name: tagpr
# Maintains a release PR on every push to main. Merging the PR cuts the
# next semver tag automatically and publishes a GitHub Release whose body
# is generated by tagpr from the merged PR descriptions.
#
# Bump kind is controlled by labels on merged PRs:
#   tagpr:minor / tagpr:major (default: patch).
#
# Token: uses the workflow's GITHUB_TOKEN. Because pushes made with
# GITHUB_TOKEN do not start new workflow runs, the tag push will NOT
# trigger .github/workflows/release.yml. Asset publishing via GoReleaser
# is currently out of scope for this workflow.

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  tagpr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: Songmu/tagpr@e84001bd5dac8defa0c75b3913937d284a3b3660 # v1.20.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
