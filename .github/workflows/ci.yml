name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build ./cmd/vimpin

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: go fmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "$out"
            echo "gofmt found unformatted files"
            exit 1
          fi

  smoke:
    name: smoke (network)
    runs-on: ubuntu-latest
    # Manual-only — the smoke test resolves a public ref via git ls-remote
    # so the run depends on github.com reachability. Trigger via
    # workflow_dispatch when verifying end-to-end behaviour is needed.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - run: go build -o /usr/local/bin/vimpin ./cmd/vimpin
      - name: smoke run against a known-good public repo
        run: |
          mkdir -p smoke/lua/plugins
          cat > smoke/lua/plugins/spec.lua <<'LUA'
          return {
            { "folke/which-key.nvim", tag = "v3.9.0" },
          }
          LUA
          cd smoke
          vimpin run --check       # field-form -> would update, exit non-zero
          vimpin run               # apply initial pin
          vimpin run --no-api      # offline structural check
          vimpin run --verify      # SHA -> annotation reverse check (no-op if pin matches)
