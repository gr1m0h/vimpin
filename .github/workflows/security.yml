# <target-repo>/.github/workflows/security.yml
name: security
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read

jobs:
  govulncheck:
    uses: gr1m0h/.github/.github/workflows/govulncheck.yml@31cce14e0e15b5e1c6d27833ba6c1281e7bc0a21
  osv-scan:
    uses: gr1m0h/.github/.github/workflows/osv-scanner.yml@31cce14e0e15b5e1c6d27833ba6c1281e7bc0a21
    permissions:
      contents: read
      security-events: write
  gitleaks:
    uses: gr1m0h/.github/.github/workflows/gitleaks.yml@31cce14e0e15b5e1c6d27833ba6c1281e7bc0a21
  dependency-review:
    if: github.event_name == 'pull_request'
    uses: gr1m0h/.github/.github/workflows/dependency-review.yml@31cce14e0e15b5e1c6d27833ba6c1281e7bc0a21
    permissions:
      contents: read
      pull-requests: write
  codeql:
    uses: gr1m0h/.github/.github/workflows/codeql-go.yml@31cce14e0e15b5e1c6d27833ba6c1281e7bc0a21
    permissions:
      contents: read
      security-events: write
      actions: read
  actionlint:
    uses: gr1m0h/.github/.github/workflows/actions-pin-lint.yml@31cce14e0e15b5e1c6d27833ba6c1281e7bc0a21
