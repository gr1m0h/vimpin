# <target-repo>/.github/workflows/security.yml
name: security
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read

jobs:
  govulncheck:
    uses: gr1m0h/.github/.github/workflows/govulncheck.yml@bfd9d34d379bce643b84d63b33abc6c6bc13227a
  osv-scan:
    uses: gr1m0h/.github/.github/workflows/osv-scanner.yml@bfd9d34d379bce643b84d63b33abc6c6bc13227a
    permissions:
      contents: read
      security-events: write
  gitleaks:
    uses: gr1m0h/.github/.github/workflows/gitleaks.yml@bfd9d34d379bce643b84d63b33abc6c6bc13227a
  dependency-review:
    if: github.event_name == 'pull_request'
    uses: gr1m0h/.github/.github/workflows/dependency-review.yml@bfd9d34d379bce643b84d63b33abc6c6bc13227a
    permissions:
      contents: read
      pull-requests: write
  codeql:
    uses: gr1m0h/.github/.github/workflows/codeql-go.yml@bfd9d34d379bce643b84d63b33abc6c6bc13227a
    permissions:
      contents: read
      security-events: write
      actions: read
  actionlint:
    uses: gr1m0h/.github/.github/workflows/actions-pin-lint.yml@bfd9d34d379bce643b84d63b33abc6c6bc13227a
