name: Release

on:
  push:
    tags:
      - "v*"
  # workflow_dispatch is fired by tagpr.yml when it cuts a new tag,
  # because tag pushes made with GITHUB_TOKEN do not trigger the
  # `push: tags` event above. The job runs against the dispatched ref
  # (the new tag), so checkout/build target that tag.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
